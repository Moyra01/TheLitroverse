<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Quiz Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://raw.githubusercontent.com/Moyra01/TheLitroverse/main/aym-logo-wht-bg.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }

    header {
      background-color: rgba(0,0,0,0.6);
      padding: 20px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav ul li {
      display: inline;
      margin: 0 15px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .book {
      background-color: rgba(0,0,0,0.6);
      padding: 30px;
      text-align: center;
      border-radius: 8px;
      font-size: 1.2em;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .book:hover {
      transform: scale(1.05);
      background-color: rgba(255,255,255,0.2);
    }

    #quizModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      color: #000;
      justify-content: center;
      align-items: center;
    }

    #quizContent {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 80%;
      max-width: 600px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bible Quiz Home</h1>
    <nav>
      <ul>
        <li>Contact: [Add Email Here]</li>
        <li>Phone: [Add Phone Number Here]</li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="book" onclick="startQuiz('Ezekiel')">Ezekiel</div>
    <div class="book" onclick="startQuiz('Obadiah')">Obadiah</div>
    <div class="book" onclick="startQuiz('Acts')">Acts</div>
    <div class="book" onclick="startQuiz('Revelation')">Revelation</div>
    <div class="book" onclick="startQuiz('The Great Controversy')">The Great Controversy</div>
    <div class="book" onclick="startQuiz('Genesis')">Genesis</div>
  </div>

  <!-- Quiz Modal -->
  <div id="quizModal">
    <div id="quizContent">
      <h2 id="quizTitle"></h2>
      <div id="quizQuestions"></div>
      <button onclick="submitQuiz()">Submit Quiz</button>
    </div>
  </div>

  <script>
    let currentBook = '';
    let userInfo = {};
    let questions = {
      "Revelation": [
        {q: "Who wrote the book of Revelation?", options: ["Paul", "John", "Peter"], answer: "John"},
        {q: "Where was John when he received Revelation?", options: ["Patmos", "Jerusalem", "Rome"], answer: "Patmos"}
      ],
      // Add more books/questions here
    };

    function startQuiz(book) {
      currentBook = book;
      userInfo.name = prompt("Enter your name:");
      userInfo.church = prompt("Enter your church:");
      userInfo.district = prompt("Enter your district:");
      userInfo.conference = prompt("Enter your conference:");

      document.getElementById('quizTitle').innerText = book + " Quiz";
      let quizDiv = document.getElementById('quizQuestions');
      quizDiv.innerHTML = '';

      if (questions[book]) {
        questions[book].forEach((item, index) => {
          let block = document.createElement('div');
          block.innerHTML = `<p>${item.q}</p>` +
            item.options.map(opt => 
              `<label><input type="radio" name="q${index}" value="${opt}"> ${opt}</label><br>`
            ).join('');
          quizDiv.appendChild(block);
        });
      } else {
        quizDiv.innerHTML = "<p>No questions added yet for this book.</p>";
      }

      document.getElementById('quizModal').style.display = 'flex';
    }

    function submitQuiz() {
      let score = 0;
      let total = questions[currentBook] ? questions[currentBook].length : 0;
      let results = "";

      if (questions[currentBook]) {
        questions[currentBook].forEach((item, index) => {
          let selected = document.querySelector(`input[name="q${index}"]:checked`);
          if (selected) {
            if (selected.value === item.answer) {
              score++;
              results += `<p>Q${index+1}: Correct (${item.answer})</p>`;
            } else {
              results += `<p>Q${index+1}: Wrong (Correct: ${item.answer})</p>`;
            }
          } else {
            results += `<p>Q${index+1}: No answer (Correct: ${item.answer})</p>`;
          }
        });
      }

      document.getElementById('quizQuestions').innerHTML = 
        `<h3>Results for ${userInfo.name}</h3>` +
        `<p>Church: ${userInfo.church}, District: ${userInfo.district}, Conference: ${userInfo.conference}</p>` +
        `<p>Score: ${score} / ${total}</p>` +
        results;
    }
  </script>
</body>
</html>
